# Note: IP is static (192.168.1.100) and intentionally hardcoded.
# Prometheus does not support environment variable substitution natively.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['192.168.1.100:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['192.168.1.100:9100']
