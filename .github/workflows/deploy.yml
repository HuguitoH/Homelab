name: Deploy Homelab

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker Compose files
        run: |
          docker compose -f docker-compose/base.yml --env-file /home/hugoh/homelab/.env config --quiet
          docker compose -f docker-compose/monitoring.yml --env-file /home/hugoh/homelab/.env config --quiet
          docker compose -f docker-compose/services.yml --env-file /home/hugoh/homelab/.env config --quiet

      - name: Snapshot current state
        run: |
          docker ps --format "{{.Names}}" > /tmp/homelab-snapshot.txt
          echo "Snapshot saved — $(cat /tmp/homelab-snapshot.txt | wc -l) containers running"

      - name: Deploy
        id: deploy
        run: |
          docker compose -f docker-compose/base.yml --env-file /home/hugoh/homelab/.env up -d
          docker compose -f docker-compose/monitoring.yml --env-file /home/hugoh/homelab/.env up -d
          docker compose -f docker-compose/services.yml --env-file /home/hugoh/homelab/.env up -d

      - name: Health check
        id: healthcheck
        run: |
          sleep 15
          curl -sf https://nginx.hugohhm.dev > /dev/null || exit 1
          curl -sf https://grafana.hugohhm.dev > /dev/null || exit 1
          curl -sf https://beszel.hugohhm.dev > /dev/null || exit 1
          curl -sf https://uptime-kuma.hugohhm.dev > /dev/null || exit 1
          curl -sf https://homepage.hugohhm.dev > /dev/null || exit 1
          curl -sf https://vaultwarden.hugohhm.dev > /dev/null || exit 1
          curl -sf https://ntfy.hugohhm.dev > /dev/null || exit 1
          echo "All endpoints healthy"

      - name: Rollback on health check failure
        if: failure() && steps.healthcheck.outcome == 'failure'
        run: |
          echo "Health check failed — rolling back to previous state"
          cd /home/hugoh/homelab
          git stash
          docker compose -f docker-compose/base.yml --env-file /home/hugoh/homelab/.env up -d
          docker compose -f docker-compose/monitoring.yml --env-file /home/hugoh/homelab/.env up -d
          docker compose -f docker-compose/services.yml --env-file /home/hugoh/homelab/.env up -d
          curl -d "🔺 Deploy fallido — rollback ejecutado - $(date)" https://ntfy.hugohhm.dev/hugohhm-homelab

      - name: Notify success
        if: success()
        run: |
          curl -d "✔️ Deploy exitoso - $(date)" https://ntfy.hugohhm.dev/hugohhm-homelab

      - name: Notify failure
        if: failure() && steps.healthcheck.outcome != 'failure'
        run: |
          curl -d "✖️ Deploy fallido en validate/deploy - $(date)" https://ntfy.hugohhm.dev/hugohhm-homelab
