name: Validate

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker Compose files
        run: |
          docker compose -f docker-compose/base.yml --env-file /home/hugoh/homelab/.env config --quiet
          docker compose -f docker-compose/monitoring.yml --env-file /home/hugoh/homelab/.env config --quiet
          docker compose -f docker-compose/services.yml --env-file /home/hugoh/homelab/.env config --quiet
