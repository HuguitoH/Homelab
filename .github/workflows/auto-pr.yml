name: Auto PR develop → main

on:
  push:
    branches: [develop]

jobs:
  auto-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create PR and enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Try to create PR and capture the URL
          PR_URL=$(gh pr create \
            --base main \
            --head develop \
            --title "chore: sync develop → main" \
            --body "Automated PR — triggered by push to develop." \
            2>&1) || true

          echo "PR URL or message: $PR_URL"

          # If PR already exists, extract URL from error message
          if echo "$PR_URL" | grep -q "already exists"; then
            PR_URL=$(echo "$PR_URL" | grep -o 'https://github.com[^ ]*')
          fi

          # Get PR number from URL
          PR_NUMBER=$(echo "$PR_URL" | grep -o '[0-9]*$')
          echo "PR number: $PR_NUMBER"

          if [ -n "$PR_NUMBER" ]; then
            gh pr merge $PR_NUMBER --auto --squash --delete-branch=false
            echo "Auto-merge enabled on PR #$PR_NUMBER"
          else
            echo "Could not determine PR number"
          fi
